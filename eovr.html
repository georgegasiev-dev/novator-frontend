<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ЕОВР — Новатор</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #222535;
    --border: rgba(255,255,255,0.08);
    --text: #e8eaf0;
    --muted: #7b8099;
    --accent: #4f7cff;
    --c-lush: #4f7cff;
    --c-sush: #34d399;
    --c-sborka: #f59e0b;
    --c-lam: #f472b6;
    --c-obr: #a78bfa;
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    background: rgba(15,17,23,0.95);
    backdrop-filter: blur(12px);
    z-index: 10;
  }

  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-mark {
    width: 32px; height: 32px;
    background: var(--accent); border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700; color: #fff;
  }
  .logo-text { font-size: 15px; font-weight: 600; }
  .logo-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }

  .header-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 3px;
  }
  .tab-btn {
    background: transparent;
    border: none;
    border-radius: 6px;
    color: var(--muted);
    padding: 6px 16px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .tab-btn:hover { color: var(--text); opacity: 1; }
  .tab-btn.active {
    background: var(--accent);
    color: #fff;
  }

  select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    padding: 7px 12px;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
    font-family: inherit;
  }
  select:focus { border-color: var(--accent); }
  select option { background: #1a1d27; }

  button {
    background: var(--accent);
    border: none;
    border-radius: var(--radius-sm);
    color: #fff;
    padding: 7px 14px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
    font-family: inherit;
  }
  button:hover { opacity: 0.85; }
  button.secondary {
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
  }

  main { padding: 24px; max-width: 1360px; margin: 0 auto; }

  /* Status bar */
  .status-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0; border-bottom: 1px solid var(--border);
    font-size: 12px; color: var(--muted); margin-bottom: 20px;
  }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--c-sush); display: inline-block; margin-right: 6px;
  }

  /* Metric cards */
  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }
  .metric-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    display: flex; flex-direction: column; gap: 5px;
    transition: border-color 0.15s;
  }
  .metric-card:hover { border-color: rgba(255,255,255,0.15); }
  .metric-card.highlight {
    border-color: rgba(245,158,11,0.4);
    background: rgba(245,158,11,0.05);
  }
  .metric-dot { width: 8px; height: 8px; border-radius: 50%; margin-bottom: 4px; }
  .metric-label { font-size: 11px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.3px; }
  .metric-value { font-size: 26px; font-weight: 700; letter-spacing: -1px; line-height: 1; }
  .metric-unit { font-size: 11px; color: var(--muted); }
  .metric-badge { font-size: 11px; margin-top: 2px; }

  /* Charts */
  .charts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
    gap: 16px;
  }
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }
  .chart-card.wide { grid-column: 1 / -1; }
  .chart-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .chart-title { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; }
  .chart-total { font-size: 12px; color: var(--muted); }
  .chart-wrap { position: relative; width: 100%; height: 180px; }
  .chart-wrap.tall { height: 260px; }

  /* Year tab — сборка крупно */
  .sborka-hero {
    background: var(--surface);
    border: 1px solid rgba(245,158,11,0.3);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 20px;
  }
  .sborka-hero-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px; flex-wrap: wrap; gap: 12px;
  }
  .sborka-hero-title {
    font-size: 13px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--c-sborka);
    display: flex; align-items: center; gap: 8px;
  }
  .sborka-hero-stats { display: flex; gap: 24px; flex-wrap: wrap; }
  .sborka-stat { text-align: right; }
  .sborka-stat-val { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; color: var(--c-sborka); }
  .sborka-stat-label { font-size: 11px; color: var(--muted); }

  .year-secondary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
    gap: 16px;
  }

  /* Day list (month view) */
  .month-panels {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
    gap: 16px;
  }
  .day-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
  }
  .day-panel-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px; padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .day-panel-title {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 600;
  }
  .day-panel-total { font-size: 12px; color: var(--muted); }

  .day-row {
    display: grid;
    grid-template-columns: 28px 1fr 70px;
    align-items: center;
    gap: 10px;
    padding: 4px 0;
  }
  .day-row:hover { background: rgba(255,255,255,0.02); border-radius: 4px; }
  .day-num {
    font-size: 12px; color: var(--muted);
    text-align: right; font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }
  .day-bar-wrap {
    height: 14px; background: var(--surface2);
    border-radius: 3px; overflow: hidden; position: relative;
  }
  .day-bar-fill {
    height: 100%; border-radius: 3px;
    transition: width 0.2s;
  }
  .day-val {
    font-size: 12px; font-variant-numeric: tabular-nums;
    text-align: right; white-space: nowrap;
    font-weight: 500;
  }
  .day-row.is-max .day-val { font-weight: 700; }
  .day-row.is-zero .day-val { color: var(--muted); }
  .day-row.is-zero .day-bar-fill { opacity: 0.2; }

  /* Loading */
  #loading-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(15,17,23,0.75); z-index: 100;
    align-items: center; justify-content: center;
    flex-direction: column; gap: 12px;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--surface2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .loading-text { font-size: 13px; color: var(--muted); }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state { text-align: center; padding: 60px 24px; color: var(--muted); }

  /* Year progress bar */
  .progress-bar-wrap { margin-top: 8px; }
  .progress-bar-track {
    height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden;
  }
  .progress-bar-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }

  /* Month table in year view */
  .month-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .month-table th {
    text-align: right; padding: 6px 10px; color: var(--muted);
    font-weight: 500; border-bottom: 1px solid var(--border);
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.3px;
  }
  .month-table th:first-child { text-align: left; }
  .month-table td { padding: 7px 10px; text-align: right; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .month-table td:first-child { text-align: left; color: var(--muted); }
  .month-table tr:last-child td { border-bottom: none; }
  .month-table tr.total-row td { border-top: 1px solid var(--border); font-weight: 600; color: var(--text); padding-top: 10px; }
  .month-table td.sborka-col { color: var(--c-sborka); font-weight: 600; }
  .month-table tr:hover td { background: rgba(255,255,255,0.02); }

  @media (max-width: 640px) {
    main { padding: 16px; }
    .charts-grid { grid-template-columns: 1fr; }
    .year-secondary-grid { grid-template-columns: 1fr; }
    .metric-value { font-size: 20px; }
  }
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">Загрузка данных...</div>
</div>

<header>
  <div class="logo">
    <div class="logo-mark">Н</div>
    <div>
      <div class="logo-text">Новатор · ЕОВР</div>
      <div class="logo-sub" id="header-sub">Загрузка...</div>
    </div>
  </div>
  <div class="header-right">
    <div class="tabs">
      <button class="tab-btn active" id="tab-month-btn" onclick="switchTab('month')">Месяц</button>
      <button class="tab-btn" id="tab-year-btn" onclick="switchTab('year')">Год</button>
    </div>
    <select id="month-select" style="display:none"></select>
    <select id="year-select" style="display:none"></select>
    <button class="secondary" id="refresh-btn" onclick="refreshData()" title="Обновить данные из Google Sheets">↻ Обновить</button>
    <button class="secondary" onclick="showDebug()">Отладка</button>
  </div>
</header>

<main>
  <div class="status-row">
    <span><span class="status-dot"></span><span id="status-text">Загрузка...</span></span>
    <span id="last-update"></span>
  </div>

  <!-- МЕСЯЦ -->
  <div id="tab-month">
    <div class="metrics-grid" id="month-metrics"></div>
    <div class="charts-grid" id="month-charts"></div>
    <div id="month-empty" class="empty-state" style="display:none">Нет данных за этот месяц</div>
  </div>

  <!-- ГОД -->
  <div id="tab-year" style="display:none">
    <!-- Сборка крупно -->
    <div class="sborka-hero">
      <div class="sborka-hero-header">
        <div class="sborka-hero-title">
          <span style="width:10px;height:10px;border-radius:50%;background:var(--c-sborka);display:inline-block;"></span>
          Сборка — динамика по месяцам
        </div>
        <div class="sborka-hero-stats" id="year-sborka-stats"></div>
      </div>
      <div class="chart-wrap tall">
        <canvas id="chart-year-sborka"></canvas>
      </div>
    </div>

    <!-- Остальные переделы -->
    <div class="year-secondary-grid" id="year-secondary-charts"></div>

    <!-- Сводная таблица -->
    <div class="chart-card" style="margin-top:16px;">
      <div class="chart-header">
        <div class="chart-title">Сводная таблица по месяцам</div>
        <div class="chart-total" id="year-table-caption"></div>
      </div>
      <div style="overflow-x:auto;">
        <table class="month-table" id="year-table"></table>
      </div>
    </div>

    <div id="year-empty" class="empty-state" style="display:none">Нет данных за этот год</div>
  </div>
</main>

<!-- Debug overlay -->
<div id="debug-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:1000;overflow:auto;padding:20px;">
  <div style="max-width:1400px;margin:0 auto;background:#1a1d27;border-radius:12px;padding:20px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h2 style="margin:0;font-size:18px;">Отладка — сырые данные</h2>
      <button class="secondary" onclick="hideDebug()">Закрыть</button>
    </div>
    <div id="debug-content" style="font-family:Menlo,monospace;font-size:11px;color:#ddd;overflow-x:auto;"></div>
  </div>
</div>

<script>
const SHEET_ID = '1iYEuupLfhvM-jS4D8NiaL2dcnoUheu1GRPy5UJc9yUg';
const API_KEY  = 'AIzaSyAdAPQ2x7EMsBH-JBusw6ioxQZ8xdPbEP0';

const METRICS = [
  { key: 'lush',   label: 'Лущилка',   color: '#4f7cff', unit: 'л' },
  { key: 'sush',   label: 'Сушилка',   color: '#34d399', unit: 'л' },
  { key: 'sborka', label: 'Сборка',    color: '#f59e0b', unit: 'л' },
  { key: 'lam',    label: 'Ламинация', color: '#f472b6', unit: 'м²' },
  { key: 'obr',    label: 'Обрезка',   color: '#a78bfa', unit: 'л' },
];

const MONTH_NAMES = {
  'январь':1,'февраль':2,'март':3,'апрель':4,'май':5,'июнь':6,
  'июль':7,'август':8,'сентябрь':9,'октябрь':10,'ноябрь':11,'декабрь':12,
  'Январь':1,'Февраль':2,'Март':3,'Апрель':4,'Май':5,'Июнь':6,
  'Июль':7,'Август':8,'Сентябрь':9,'Октябрь':10,'Ноябрь':11,'Декабрь':12,
};
const MONTH_SHORT = ['','Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];
const MONTH_FULL  = ['','Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];

let sheets = [];           // [{month, year, title, label}]
let charts = {};           // активные Chart.js инстансы
let monthCache = {};       // title -> totals {lush,sush,sborka,lam,obr,_control}
let lastRawData = null;
let lastSheetTitle = null;
let currentTab = 'month';
let currentYear = null;

// ─── Парсинг ───────────────────────────────────────────────────────────────

function parseSheetName(name) {
  const parts = name.trim().split(/\s+/);
  let month = null, year = null;
  for (const p of parts) {
    const mn = MONTH_NAMES[p];
    if (mn) month = mn;
    const y = parseInt(p);
    if (y >= 2016 && y <= 2030) year = y;
  }
  return (month && year) ? { month, year, label: name.trim() } : null;
}

function parseRows(rows) {
  const days = {};
  let controlTotal = null;

  const COL_LUSH   = [2, 3, 4, 5, 6];
  const COL_SUSH   = 7;
  const COL_SBORKA = [9, 10, 11, 12];
  const COL_LAM    = 16;
  const COL_OBR    = 19;

  let headerRow = -1;
  for (let i = 0; i < Math.min(10, rows.length); i++) {
    const j = (rows[i] || []).map(c => String(c).toLowerCase()).join('|');
    if (j.includes('фан') && j.includes('тонкомер')) { headerRow = i; break; }
  }
  if (headerRow < 0) {
    for (let i = 0; i < Math.min(10, rows.length); i++) {
      const j = (rows[i] || []).map(c => String(c).toLowerCase()).join('|');
      if (j.includes('лущилка')) { headerRow = i + 1; break; }
    }
  }

  if (rows[0]) {
    const v = parseFloat(String(rows[0][4] || '').replace(',','.').replace(/[^0-9.]/g,''));
    if (v > 1000) controlTotal = v;
  }

  const dataStart = Math.max(headerRow + 1, 5);
  const parseN = (r, idx) => {
    if (idx < 0 || idx >= r.length) return 0;
    const v = String(r[idx] || '').replace(',','.').replace(/[^0-9.]/g,'');
    const n = parseFloat(v);
    return (n && n < 100000) ? n : 0;
  };
  const sumCols = (r, cols) => cols.reduce((s,c) => s + parseN(r,c), 0);

  let lastDate = null;
  for (let i = dataStart; i < rows.length; i++) {
    const r = rows[i];
    if (!r || r.length < 2) continue;
    const pd = parseInt(String(r[0]||'').trim());
    if (pd >= 1 && pd <= 31) lastDate = pd;
    const shift = parseInt(String(r[1]||'').trim());
    if (!shift || shift < 1 || shift > 3 || !lastDate) continue;
    if (!days[lastDate]) days[lastDate] = { lush:0, sush:0, sborka:0, lam:0, obr:0 };
    days[lastDate].lush   += sumCols(r, COL_LUSH);
    days[lastDate].sush   += parseN(r, COL_SUSH);
    days[lastDate].sborka += sumCols(r, COL_SBORKA);
    days[lastDate].lam    += parseN(r, COL_LAM);
    days[lastDate].obr    += parseN(r, COL_OBR);
  }
  days._control = controlTotal;
  return days;
}

function daysToTotals(days) {
  const t = { lush:0, sush:0, sborka:0, lam:0, obr:0 };
  Object.entries(days).filter(([k])=>k!=='_control').forEach(([,d])=>{
    METRICS.forEach(m => t[m.key] += d[m.key]);
  });
  t._control = days._control;
  return t;
}

// ─── Загрузка ──────────────────────────────────────────────────────────────

async function fetchSheet(title) {
  const range = encodeURIComponent(`'${title}'!A1:AA110`);
  const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${range}?key=${API_KEY}`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  return data.values || [];
}

async function connect() {
  showLoading(true, 'Получение списка листов...');
  try {
    const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}?fields=sheets.properties&key=${API_KEY}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    sheets = data.sheets
      .map(s => ({ ...parseSheetName(s.properties.title), title: s.properties.title }))
      .filter(s => s && s.month && s.year)
      .sort((a,b) => b.year - a.year || b.month - a.month);

    if (!sheets.length) throw new Error('Листы ЕОВР не найдены');

    buildSelects();
    updateTimestamp();
    await switchTab('month');
  } catch(e) {
    document.getElementById('status-text').textContent = 'Ошибка: ' + e.message;
  } finally {
    showLoading(false);
  }
}

function buildSelects() {
  // Month select
  const ms = document.getElementById('month-select');
  ms.innerHTML = sheets.map(s => `<option value="${s.title}">${s.label}</option>`).join('');
  ms.onchange = () => loadMonth(ms.value);

  // Year select — уникальные годы
  const years = [...new Set(sheets.map(s => s.year))].sort((a,b) => b-a);
  const ys = document.getElementById('year-select');
  ys.innerHTML = years.map(y => `<option value="${y}">${y}</option>`).join('');
  currentYear = years[0];
  ys.onchange = () => { currentYear = +ys.value; renderYear(); };
}

async function loadMonth(title) {
  if (monthCache[title]) {
    renderMonth(monthCache[title].days, title);
    return;
  }
  showLoading(true, 'Загрузка месяца...');
  try {
    const rows = await fetchSheet(title);
    lastRawData = rows;
    lastSheetTitle = title;
    const days = parseRows(rows);
    monthCache[title] = { days, totals: daysToTotals(days) };
    renderMonth(days, title);
  } catch(e) {
    document.getElementById('status-text').textContent = 'Ошибка: ' + e.message;
  } finally {
    showLoading(false);
  }
}

// ─── Вкладки ───────────────────────────────────────────────────────────────

async function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-month').style.display = tab === 'month' ? '' : 'none';
  document.getElementById('tab-year').style.display  = tab === 'year'  ? '' : 'none';
  document.getElementById('tab-month-btn').classList.toggle('active', tab === 'month');
  document.getElementById('tab-year-btn').classList.toggle('active', tab === 'year');
  document.getElementById('month-select').style.display = tab === 'month' ? '' : 'none';
  document.getElementById('year-select').style.display  = tab === 'year'  ? '' : 'none';

  if (tab === 'month') {
    const sel = document.getElementById('month-select');
    if (sel.value) await loadMonth(sel.value);
  } else {
    await renderYear();
  }
}

// ─── Рендер месяца ─────────────────────────────────────────────────────────

function renderMonth(days, title) {
  destroyCharts(['month-']);
  const dayList = Object.entries(days).filter(([k])=>k!=='_control').sort((a,b)=>+a[0]-+b[0]);
  const hasData = dayList.length > 0;
  document.getElementById('month-empty').style.display = hasData ? 'none' : 'block';
  document.getElementById('month-metrics').style.display = hasData ? '' : 'none';
  document.getElementById('month-charts').style.display = hasData ? '' : 'none';
  document.getElementById('status-text').textContent = title + ' — загружено';
  document.getElementById('header-sub').textContent = title;

  if (!hasData) return;

  const totals = daysToTotals(days);

  // Метрики
  document.getElementById('month-metrics').innerHTML = METRICS.map(m => {
    const val = Math.round(totals[m.key]);
    const isLush = m.key === 'lush';
    const ctrl = isLush && totals._control ? Math.round(totals._control) : null;
    const match = ctrl ? Math.abs(val-ctrl) < 10 : null;
    const badge = ctrl
      ? `<div class="metric-badge" style="color:${match?'#34d399':'#f87171'}">${match ? '✓ сходится' : '⚠ шапка: '+ctrl.toLocaleString('ru')}</div>`
      : '';
    return `<div class="metric-card ${m.key==='sborka'?'highlight':''}">
      <div class="metric-dot" style="background:${m.color}"></div>
      <div class="metric-label">${m.label}</div>
      <div class="metric-value" style="color:${m.color}">${val.toLocaleString('ru')}</div>
      <div class="metric-unit">${m.unit} за месяц</div>
      ${badge}
    </div>`;
  }).join('');

  // Списки с барами — по одному панелю на каждый передел
  const cg = document.getElementById('month-charts');
  cg.className = 'month-panels';

  cg.innerHTML = METRICS.map(m => {
    const vals = dayList.map(([,v]) => Math.round(v[m.key]));
    const maxVal = Math.max(...vals, 1);
    const total  = vals.reduce((a,b)=>a+b,0);
    const avg    = Math.round(total / (vals.length || 1));

    const rows = dayList.map(([day], i) => {
      const v    = vals[i];
      const pct  = Math.round((v / maxVal) * 100);
      const isMax  = v === maxVal && v > 0;
      const isZero = v === 0;
      return `<div class="day-row${isMax?' is-max':''}${isZero?' is-zero':''}">
        <div class="day-num">${day}</div>
        <div class="day-bar-wrap">
          <div class="day-bar-fill" style="width:${pct}%;background:${m.color}${isMax?'':'88'}"></div>
        </div>
        <div class="day-val" style="color:${isZero?'var(--muted)':m.color}">${v.toLocaleString('ru')}</div>
      </div>`;
    }).join('');

    return `<div class="day-panel">
      <div class="day-panel-header">
        <div class="day-panel-title">
          <span style="width:9px;height:9px;border-radius:50%;background:${m.color};display:inline-block;"></span>
          ${m.label}
        </div>
        <div class="day-panel-total">${total.toLocaleString('ru')} ${m.unit} · ср. ${avg.toLocaleString('ru')}</div>
      </div>
      ${rows}
    </div>`;
  }).join('');
}

// ─── Рендер года ───────────────────────────────────────────────────────────

async function renderYear() {
  const yearSheets = sheets.filter(s => s.year === currentYear).sort((a,b)=>a.month-b.month);
  if (!yearSheets.length) {
    document.getElementById('year-empty').style.display = 'block';
    return;
  }
  document.getElementById('year-empty').style.display = 'none';

  // Загрузить все незакешированные месяцы года
  const toLoad = yearSheets.filter(s => !monthCache[s.title]);
  if (toLoad.length) {
    showLoading(true, `Загрузка ${toLoad.length} месяцев...`);
    await Promise.all(toLoad.map(async s => {
      try {
        const rows = await fetchSheet(s.title);
        const days = parseRows(rows);
        monthCache[s.title] = { days, totals: daysToTotals(days) };
      } catch(e) { /* пропустить */ }
    }));
    showLoading(false);
  }

  // Собрать данные по месяцам
  const monthData = yearSheets
    .filter(s => monthCache[s.title])
    .map(s => ({ ...s, totals: monthCache[s.title].totals }));

  if (!monthData.length) return;

  destroyCharts(['year-']);

  document.getElementById('header-sub').textContent = `Год ${currentYear}`;
  document.getElementById('status-text').textContent = `${currentYear} — ${monthData.length} месяцев загружено`;
  updateTimestamp();

  const labels = monthData.map(d => MONTH_SHORT[d.month]);

  // ── Сборка — главный большой график ──
  const sborkaData = monthData.map(d => Math.round(d.totals.sborka));
  const sborkaTotalYear = sborkaData.reduce((a,b)=>a+b,0);
  const sborkaAvgMonth  = Math.round(sborkaTotalYear / (monthData.length||1));
  const sborkaMax       = Math.max(...sborkaData);

  document.getElementById('year-sborka-stats').innerHTML = `
    <div class="sborka-stat">
      <div class="sborka-stat-val">${sborkaTotalYear.toLocaleString('ru')}</div>
      <div class="sborka-stat-label">листов за год</div>
    </div>
    <div class="sborka-stat">
      <div class="sborka-stat-val">${sborkaAvgMonth.toLocaleString('ru')}</div>
      <div class="sborka-stat-label">среднее в месяц</div>
    </div>
    <div class="sborka-stat">
      <div class="sborka-stat-val">${sborkaMax.toLocaleString('ru')}</div>
      <div class="sborka-stat-label">лучший месяц</div>
    </div>`;

  charts['year-sborka'] = new Chart(document.getElementById('chart-year-sborka'), {
    type: 'bar',
    data: { labels, datasets: [
      {
        label: 'Сборка',
        data: sborkaData,
        backgroundColor: sborkaData.map(v => v === sborkaMax ? '#f59e0b' : '#f59e0b44'),
        borderColor: '#f59e0b',
        borderWidth: 1.5,
        borderRadius: 4,
        order: 2
      },
      {
        label: 'Среднее',
        data: sborkaData.map(()=>sborkaAvgMonth),
        type:'line', borderColor:'#f59e0b88', borderWidth:1.5,
        borderDash:[5,4], pointRadius:0, tension:0, order:1
      }
    ]},
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor:'#1a1d27', borderColor:'rgba(255,255,255,0.1)', borderWidth:1,
          titleColor:'#7b8099', bodyColor:'#e8eaf0',
          callbacks: { label: ctx => ctx.datasetIndex===0 ? `${ctx.parsed.y.toLocaleString('ru')} л` : `среднее: ${sborkaAvgMonth.toLocaleString('ru')} л` }
        }
      },
      scales: {
        x: { ticks:{color:'#7b8099',font:{size:12}}, grid:{display:false}, border:{color:'rgba(255,255,255,0.06)'} },
        y: { ticks:{color:'#7b8099',font:{size:11}}, grid:{color:'rgba(255,255,255,0.05)'}, border:{display:false} }
      }
    }
  });

  // ── Остальные переделы — компактно ──
  const secMetrics = METRICS.filter(m => m.key !== 'sborka');
  const sc = document.getElementById('year-secondary-charts');
  sc.innerHTML = secMetrics.map(m => `
    <div class="chart-card">
      <div class="chart-header">
        <div class="chart-title">
          <span style="width:9px;height:9px;border-radius:50%;background:${m.color};display:inline-block;"></span>
          ${m.label}
        </div>
        <div class="chart-total">${monthData.map(d=>d.totals[m.key]).reduce((a,b)=>a+b,0).toLocaleString('ru')} ${m.unit}</div>
      </div>
      <div class="chart-wrap"><canvas id="year-chart-${m.key}"></canvas></div>
    </div>`).join('');

  secMetrics.forEach(m => {
    const data = monthData.map(d => Math.round(d.totals[m.key]));
    const avg  = Math.round(data.reduce((a,b)=>a+b,0)/(data.length||1));
    charts['year-'+m.key] = new Chart(document.getElementById('year-chart-'+m.key), {
      type: 'bar',
      data: { labels, datasets: [
        { label: m.label, data, backgroundColor: m.color+'44', borderColor: m.color, borderWidth:1.5, borderRadius:3, order:2 },
        { label:'Среднее', data:data.map(()=>avg), type:'line', borderColor:m.color+'99', borderWidth:1.5, borderDash:[4,4], pointRadius:0, tension:0, order:1 }
      ]},
      options: chartOpts(m)
    });
  });

  // ── Сводная таблица ──
  const yearTotals = { lush:0, sush:0, sborka:0, lam:0, obr:0 };
  METRICS.forEach(m => yearTotals[m.key] = monthData.reduce((s,d)=>s+d.totals[m.key],0));

  document.getElementById('year-table-caption').textContent = `${currentYear} · ${monthData.length} мес.`;

  let html = '<thead><tr><th>Месяц</th>';
  METRICS.forEach(m => html += `<th style="color:${m.color}">${m.label}</th>`);
  html += '</tr></thead><tbody>';
  monthData.forEach(d => {
    html += `<tr><td>${MONTH_FULL[d.month]}</td>`;
    METRICS.forEach(m => html += `<td class="${m.key==='sborka'?'sborka-col':''}">${Math.round(d.totals[m.key]).toLocaleString('ru')}</td>`);
    html += '</tr>';
  });
  // Итого
  html += '<tr class="total-row"><td>Итого</td>';
  METRICS.forEach(m => html += `<td class="${m.key==='sborka'?'sborka-col':''}">${Math.round(yearTotals[m.key]).toLocaleString('ru')}</td>`);
  html += '</tr></tbody>';
  document.getElementById('year-table').innerHTML = html;
}

// ─── Утилиты ───────────────────────────────────────────────────────────────

function chartOpts(m) {
  return {
    responsive: true, maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor:'#1a1d27', borderColor:'rgba(255,255,255,0.1)', borderWidth:1,
        titleColor:'#7b8099', bodyColor:'#e8eaf0',
        callbacks: { label: ctx => `${ctx.parsed.y.toLocaleString('ru')} ${m.unit}` }
      }
    },
    scales: {
      x: { ticks:{color:'#7b8099',font:{size:11},maxTicksLimit:16}, grid:{display:false}, border:{color:'rgba(255,255,255,0.06)'} },
      y: { ticks:{color:'#7b8099',font:{size:11}}, grid:{color:'rgba(255,255,255,0.05)'}, border:{display:false} }
    }
  };
}

function destroyCharts(prefixes) {
  Object.keys(charts).forEach(k => {
    if (prefixes.some(p => k.startsWith(p))) { charts[k].destroy(); delete charts[k]; }
  });
}

function showLoading(on, text) {
  const el = document.getElementById('loading-overlay');
  el.style.display = on ? 'flex' : 'none';
  if (text) document.getElementById('loading-text').textContent = text;
}

function updateTimestamp() {
  document.getElementById('last-update').textContent =
    'Обновлено: ' + new Date().toLocaleTimeString('ru', {hour:'2-digit',minute:'2-digit'});
}

function showDebug() {
  if (!lastRawData) { alert('Сначала загрузи месяц'); return; }
  const rows = lastRawData;
  const maxCols = Math.max(...rows.map(r=>r.length), 22);
  const col = i => { let s='',n=i; do{s=String.fromCharCode(65+(n%26))+s;n=Math.floor(n/26)-1;}while(n>=0); return s; };
  let html = `<div style="margin-bottom:8px;color:#aaf;">Лист: <b>${lastSheetTitle}</b> — строк: ${rows.length}</div>`;
  html += '<table style="border-collapse:collapse;font-size:11px;"><tr><th style="background:#222;padding:4px 6px;border:1px solid #333;">#</th>';
  for(let c=0;c<maxCols;c++) html+=`<th style="padding:4px 6px;border:1px solid #333;background:#1f2436;color:#7df;min-width:55px;">${col(c)}<br><span style="color:#888;font-weight:normal;">[${c}]</span></th>`;
  html+='</tr>';
  for(let r=0;r<Math.min(rows.length,20);r++){
    const row=rows[r]||[];
    html+=`<tr><td style="background:#222;padding:3px 6px;border:1px solid #333;color:#888;text-align:right;">${r+1}</td>`;
    for(let c=0;c<maxCols;c++){
      let v=String(row[c]||''); if(v.length>14)v=v.slice(0,12)+'…';
      const num=!isNaN(parseFloat(v))&&isFinite(v);
      html+=`<td style="padding:3px 6px;border:1px solid #2a2e3a;background:${num&&parseFloat(v)>0?'#1a2e1a':'transparent'};white-space:nowrap;">${v||'<span style="color:#444">·</span>'}</td>`;
    }
    html+='</tr>';
  }
  html+='</table>';
  document.getElementById('debug-content').innerHTML = html;
  document.getElementById('debug-overlay').style.display='block';
}

function hideDebug() { document.getElementById('debug-overlay').style.display='none'; }

async function refreshData() {
  // Сбросить кеш и перезагрузить текущий вид
  monthCache = {};
  const btn = document.getElementById('refresh-btn');
  btn.textContent = '↻ Загрузка...';
  btn.disabled = true;
  try {
    // Также триггерим синхронизацию на бэкенде (не ждём)
    fetch('https://zavod-production.up.railway.app/api/eovr/sync', { method: 'POST' })
      .catch(() => {});
    if (currentTab === 'month') {
      const sel = document.getElementById('month-select');
      if (sel.value) await loadMonth(sel.value);
    } else {
      await renderYear();
    }
  } finally {
    btn.textContent = '↻ Обновить';
    btn.disabled = false;
  }
}

window.addEventListener('load', connect);
</script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0b0b0b;color:#e0e0e0;font-family:system-ui,-apple-system,sans-serif;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:#111}
::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:2px}

.hdr{padding:14px 20px 12px;border-bottom:1px solid #222;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:#0b0b0b;position:sticky;top:0;z-index:200}
.brand{display:flex;align-items:center;gap:12px}
.mark{width:34px;height:34px;background:#1a3a6b;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:700;flex-shrink:0}
.brand-name{font-size:20px;font-weight:800}
.brand-name span{color:#f0a500}
.brand-sub{font-size:9px;letter-spacing:2px;color:#444;text-transform:uppercase;margin-bottom:3px}
.hdr-right{display:flex;align-items:center;gap:14px}
.status-dot{display:flex;align-items:center;gap:6px;font-size:11px;color:#555}
.dot{width:7px;height:7px;border-radius:50%;background:#2a2a2a;flex-shrink:0}
.dot.ok{background:#3db88a}.dot.err{background:#d95f5f}.dot.loading{background:#f0a500;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.upload-btn{padding:7px 14px;border:1px solid #2a2a2a;border-radius:6px;background:transparent;color:#666;cursor:pointer;font-size:11px;font-weight:600;letter-spacing:.5px;transition:all .15s}
.upload-btn:hover,.upload-btn.active{border-color:#f0a500;color:#f0a500;background:rgba(240,165,0,.08)}
.last-update{font-size:10px;color:#3a3a3a;text-align:right;line-height:1.7}
.last-update span{color:#555}

.upload-panel{background:#111;border-bottom:1px solid #222;padding:12px 20px;display:none;align-items:center;gap:14px;flex-wrap:wrap}
.upload-panel.show{display:flex}
.month-btns{display:flex;gap:4px;flex-wrap:wrap}
.mbtn{padding:4px 10px;border:1px solid #222;border-radius:4px;background:transparent;color:#444;cursor:pointer;font-size:11px;transition:all .15s}
.mbtn.sel{border-color:#f0a500;color:#f0a500;background:rgba(240,165,0,.08)}
.file-btn{padding:7px 16px;border:none;border-radius:6px;background:#f0a500;color:#000;cursor:pointer;font-size:11px;font-weight:700}
.file-btn:disabled{opacity:.5;cursor:default}
.prog-wrap{flex:1;min-width:100px;height:3px;background:#222;border-radius:2px;overflow:hidden;display:none}
.prog-wrap.show{display:block}
.prog{height:100%;background:#f0a500;width:0;transition:width .3s}
.upload-hint{font-size:10px;color:#333}

.mtabs{display:flex;background:#0d0d0d;border-bottom:1px solid #222;overflow-x:auto;flex-shrink:0}
.mtab{padding:10px 18px;border:none;border-bottom:2px solid transparent;background:transparent;color:#444;cursor:pointer;font-size:12px;white-space:nowrap;flex-shrink:0;transition:all .15s}
.mtab:hover{color:#888}
.mtab.active{color:#f0a500;border-bottom-color:#f0a500;font-weight:700;background:#111}
.mtab .fdot{display:inline-block;width:5px;height:5px;border-radius:50%;background:#3db88a;margin-left:5px;vertical-align:middle}

.mbar{padding:8px 16px;background:#111;border-bottom:1px solid #222;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.mbar-title{font-size:14px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.fact-tag{margin-left:10px;font-size:10px;color:#3db88a;font-weight:400;letter-spacing:1px}
.mbar-right{font-size:10px;color:#3a3a3a}

/* table layout */
.tbl-wrap{flex:1;overflow:auto;position:relative}
table{border-collapse:collapse;table-layout:fixed;width:max-content}

/* sticky first column */
.col-label{width:220px;min-width:220px;max-width:220px}
.col-num{width:88px;min-width:88px}
.col-sep{width:88px;min-width:88px}

thead{position:sticky;top:0;z-index:50}
.th-label{padding:10px 14px;text-align:left;font-size:11px;color:#f0a500;font-weight:700;
  border-right:2px solid #252525;border-bottom:1px solid #222;
  background:#0d0d0d;z-index:52;letter-spacing:.5px;text-transform:uppercase;
  position:sticky;left:0;width:220px;min-width:220px}
.th-week{padding:7px 6px;text-align:center;font-size:10px;font-weight:700;border-bottom:1px solid #1e1e1e;background:#0d0d0d}
.th-week-n{color:#f0a500;font-size:11px}
.th-week-d{color:#444;font-size:9px;margin-top:1px}
.th-sub{padding:4px 5px;text-align:right;font-size:9px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;background:#0a0a0a;border-bottom:2px solid #252525}
.th-sub.plan-h{color:#444}
.th-sub.fact-h{color:#888}
.th-sub.diff-h{color:#555}

/* body cells */
td{border-bottom:1px solid #1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
td.lbl{padding:0 10px 0 0;font-size:11px;position:sticky;left:0;z-index:10;border-right:2px solid #252525;width:220px;min-width:220px;max-width:220px}
td.lbl .inner{display:flex;align-items:center;padding:6px 10px 6px 0;min-height:32px}
td.lbl .grp-btn{width:22px;height:22px;border:1px solid #2a2a2a;border-radius:4px;background:transparent;color:#555;cursor:pointer;font-size:12px;font-weight:700;flex-shrink:0;margin:0 8px 0 10px;display:flex;align-items:center;justify-content:center;line-height:1;transition:all .15s}
td.lbl .grp-btn:hover{border-color:#f0a500;color:#f0a500}
td.lbl .grp-dot{width:3px;height:3px;border-radius:50%;background:#2e2e2e;display:inline-block;margin:0 8px 0 14px;flex-shrink:0}
td.lbl .lbl-txt{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
td.v{padding:6px 8px;text-align:right;font-size:11px}

/* number colors — переплата=зелёный, экономия=красный */
.plan-c{color:#4a4a4a}
.fact-ok{color:#e0e0e0}
.fact-over{color:#3db88a}   /* переплатили → зелёный */
.fact-under{color:#d95f5f}  /* недоплатили → красный */
.fact-none{color:#252525;font-size:9px}
.diff-pos{color:#3db88a}    /* факт > план → зелёный */
.diff-neg{color:#d95f5f}    /* факт < план → красный */
.diff-zero{color:#3a3a3a}
.diff-none{color:#252525;font-size:9px}
/* для доходов наоборот */
.income-ok{color:#3db88a}
.income-bad{color:#d95f5f}

.sep-r2{border-right:2px solid #252525!important}
.sep-r1{border-right:1px solid #252525!important}
.sep-l2{border-left:2px solid #252525!important}
.sep-r1e{border-right:1px solid #1e1e1e!important}

/* row types */
tr.grp-header td.lbl{font-weight:700;letter-spacing:.3px}
tr.grp-header td.lbl .lbl-txt{color:#ccc}
tr.sub-row td.lbl .lbl-txt{color:#e0e0e0}
tr.total-row td{font-weight:700}
tr.total-row td.lbl .lbl-txt{color:#ccc;letter-spacing:.4px;text-transform:uppercase}
tr.grand-row td{font-weight:700}
tr.grand-row td.lbl .lbl-txt{color:#3db88a;letter-spacing:.4px;text-transform:uppercase}
tr.income-row td.lbl .lbl-txt{color:#f0a500}
tr.sep-row td{padding:3px 14px;font-size:9px;letter-spacing:2px;color:#252525;background:#0c0c0c;text-transform:uppercase}
tr.hidden-row{display:none}

.footer{padding:7px 16px;background:#0d0d0d;border-top:1px solid #1e1e1e;display:flex;gap:20px;font-size:10px;color:#333;flex-shrink:0;flex-wrap:wrap}
.footer .api-url{margin-left:auto;color:#444}
.footer .api-url span{color:#3db88a}

.toast{position:fixed;bottom:16px;right:16px;padding:10px 16px;border-radius:6px;font-size:11px;font-weight:700;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;max-width:340px}
.toast.show{opacity:1}
.toast.ok{background:#f0a500;color:#000}
.toast.err{background:#d95f5f;color:#fff}

.unk-panel{background:#1a1208;border:1px solid #3a2800;border-radius:8px;margin:12px 20px;padding:16px;display:none}

.unk-title{font-size:12px;font-weight:700;color:#f0a500;letter-spacing:.5px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.unk-title .cnt{background:#f0a500;color:#000;border-radius:3px;padding:1px 7px;font-size:10px}
.unk-table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:12px}
.unk-table th{padding:6px 10px;text-align:left;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:#555;border-bottom:1px solid #2a2000}
.unk-table td{padding:7px 10px;border-bottom:1px solid #1e1400;color:#999;vertical-align:middle}
.unk-table td:first-child{color:#ccc;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-select{background:#111;border:1px solid #2a2a2a;border-radius:4px;color:#e0e0e0;font-size:11px;padding:4px 8px;cursor:pointer;width:100%}
.cat-select:focus{outline:none;border-color:#f0a500}
.unk-save{padding:8px 18px;border:none;border-radius:6px;background:#f0a500;color:#000;cursor:pointer;font-size:11px;font-weight:700}
.unk-save:disabled{opacity:.5;cursor:default}
.unk-dismiss{padding:8px 14px;border:1px solid #2a2a2a;border-radius:6px;background:transparent;color:#555;cursor:pointer;font-size:11px;margin-left:8px}
</style>
</head>

const BEZNAL_IDS=['les','dolg_les','perev_les','smola','plenka','gsm','rashod','svet','vuvozmys','nds','ndfl','upakovka','perevozch','zp_avans','zp_ofic','zp_bolnich','zp_shpon','zp_av_shpon','adm']

function computeTotals(plan,fact){
  const s5=(ids,src)=>Array(5).fill(0).map((_,i)=>ids.reduce((s,id)=>s+(src[id]?.[i]||0),0))
  const bp=s5(BEZNAL_IDS,plan),bf=fact?s5(BEZNAL_IDS,fact):null
  return{
    _tbeznal:{plan:bp,fact:bf},
    _tproch:{plan:plan.arenda,fact:fact?fact.arenda:null},
    _tall:{plan:bp.map((v,i)=>v+(plan.arenda[i]||0)),fact:bf?bf.map((v,i)=>v+(fact?.arenda?.[i]||0)):null},
    _fury:{plan:bp.map((v,i)=>(v+(plan.arenda[i]||0))/1260000),fact:null},
  }
}

// Суммируем строки группы для заголовка группы
function groupSum(gid, src){
  if(!src) return null
  const ids = ROWS.filter(r=>r.grp===gid&&!r.id.startsWith('_')).map(r=>r.id)
  return Array(5).fill(0).map((_,i)=>ids.reduce((s,id)=>s+(src[id]?.[i]||0),0))
}

const fN=n=>n==null||n===0?'—':new Intl.NumberFormat('ru-RU').format(Math.round(Math.abs(n)))
const fD=d=>{if(d==null)return'—';if(d===0)return'0';return(d>0?'+':'−')+fN(Math.abs(d))}
const fF=n=>(!n||n===0)?'—':n.toFixed(2)

// переплата (факт>план) → зелёный; экономия (факт<план) → красный
function fClass(p,f,isIncome){
  if(f==null)return'fact-none'
  if(isIncome)return f>=p?'income-ok':'income-bad'
  if(p===0&&f===0)return'fact-ok'
  if(p===0)return f>0?'fact-over':'fact-ok'
  const r=f/p
  return r>1.02?'fact-over':r<0.98?'fact-under':'fact-ok'
}
// diff = факт − план; + переплата → зелёный; − экономия → красный
function dClass(d,isIncome){
  if(d==null)return'diff-none'
  if(d===0)return'diff-zero'
  if(isIncome)return d>0?'diff-pos':'diff-neg'
  return d>0?'diff-pos':'diff-neg'
}

let curMonth='Май', uploadMonth='Май', serverFacts={}, monthsWithFact=new Set(['Май'])
const grpState={} // gid -> collapsed
GROUPS.forEach(g=>grpState[g.id]=false)

function toggleGroup(gid){
  grpState[gid]=!grpState[gid]
  // обновляем видимость строк
  document.querySelectorAll(`tr[data-grp="${gid}"][data-sub]`).forEach(tr=>{
    tr.classList.toggle('hidden-row',grpState[gid])
  })
  // обновляем кнопку
  const btn=document.querySelector(`button[data-grpbtn="${gid}"]`)
  if(btn)btn.textContent=grpState[gid]?'+':'−'
}

function buildThead(){
  const weeks=WM[curMonth]
  const fact=serverFacts[curMonth]||(curMonth==='Май'?MAY_FACT:null)
  const hasFact=!!fact

  let h=`<tr style="background:#0d0d0d">
    <th class="th-label col-label" rowspan="2">Статья расходов</th>`
  weeks.forEach((w,i)=>{
    const br=i===4?'border-right:2px solid #252525':'border-right:1px solid #252525'
    h+=`<th colspan="3" class="th-week" style="${br}"><div class="th-week-n">Нед ${w.n}</div><div class="th-week-d">${w.d}</div></th>`
  })
  h+=`<th colspan="3" class="th-week" style="border-left:2px solid #252525"><div style="color:#bbb;font-size:11px">Итого</div><div style="color:#444;font-size:9px;margin-top:1px">за месяц</div></th></tr>`

  h+=`<tr style="background:#0a0a0a">`
  for(let wi=0;wi<6;wi++){
    const bl=wi===5?'border-left:2px solid #252525;':''
    const br3=wi===4?'border-right:2px solid #252525':wi===5?'border-right:1px solid #1e1e1e':'border-right:1px solid #252525'
    h+=`<th class="th-sub plan-h col-num" style="${bl}border-right:1px solid #1e1e1e">план</th>`
    h+=`<th class="th-sub fact-h col-num" style="border-right:1px solid #1e1e1e">${hasFact?'факт':'факт'}</th>`
    h+=`<th class="th-sub diff-h col-sep" style="${br3}">±</th>`
  }
  h+=`</tr>`
  return h
}

function numCells(planArr,factArr,isIncome,isFury,bg,isLast,isFirst){
  let h=''
  planArr.forEach((p,wi)=>{
    const f=factArr?factArr[wi]:null
    const d=f!=null?f-p:null
    const fmt=isFury?fF:fN
    const br=wi===4?'sep-r2':wi===isLast?'sep-r1':'sep-r1'
    h+=`<td class="v plan-c col-num" style="background:${bg};border-right:1px solid #1e1e1e">${fmt(p)}</td>`
    h+=`<td class="v ${fClass(p,f,isIncome)} col-num" style="background:${bg};border-right:1px solid #1e1e1e">${f==null?'—':fmt(f)}</td>`
    h+=`<td class="v ${dClass(d,isIncome)} col-sep" style="background:${bg};${wi===4?'border-right:2px solid #252525':'border-right:1px solid #252525'}">${d==null?'—':(isFury?(d>=0?'+':'−')+Math.abs(d).toFixed(2):fD(d))}</td>`
  })
  // итого
  const tP=planArr.reduce((s,v)=>s+(v||0),0)
  const tF=factArr?factArr.reduce((s,v)=>s+(v||0),0):null
  const tD=tF!=null?tF-tP:null
  const fmt=isFury?fF:fN
  h+=`<td class="v plan-c col-num" style="background:${bg};border-left:2px solid #252525;border-right:1px solid #1e1e1e">${fmt(tP)}</td>`
  h+=`<td class="v ${fClass(tP,tF,isIncome)} col-num" style="background:${bg};border-right:1px solid #1e1e1e">${tF==null?'—':fmt(tF)}</td>`
  h+=`<td class="v ${dClass(tD,isIncome)} col-sep" style="background:${bg};border-right:1px solid #1e1e1e">${tF==null?'—':(isFury&&tD!=null?(tD>=0?'+':'−')+Math.abs(tD).toFixed(2):fD(tD))}</td>`
  return h
}

function buildTbody(){
  const plan=STD
  const fact=serverFacts[curMonth]||(curMonth==='Май'?MAY_FACT:null)
  const totals=computeTotals(plan,fact)
  let html=''
  let idx=0

  // Группы
  GROUPS.forEach(grp=>{
    const gid=grp.id
    const collapsed=grpState[gid]
    // Суммы для строки-заголовка группы
    const gPlan=groupSum(gid,plan)
    const gFact=groupSum(gid,fact)

    const bg='#131313'
    // Заголовок группы
    html+=`<tr class="grp-header" data-grp="${gid}">
      <td class="lbl" style="background:${bg}">
        <div class="inner">
          <button class="grp-btn" data-grpbtn="${gid}" onclick="toggleGroup('${gid}')">${collapsed?'+':'−'}</button>
          <span class="lbl-txt" style="font-weight:700;color:#ccc;letter-spacing:.3px">${grp.label}</span>
        </div>
      </td>`
    html+=numCells(gPlan,gFact,false,false,bg,4,0)
    html+=`</tr>`

    // Дочерние строки
    const rows=ROWS.filter(r=>r.grp===gid)
    rows.forEach((row,ri)=>{
      const alt=ri%2===0?'#111':'#161616'
      const pArr=plan[row.id]||[0,0,0,0,0]
      const fArr=fact?(fact[row.id]||Array(5).fill(null)):null
      html+=`<tr class="sub-row${collapsed?' hidden-row':''}" data-grp="${gid}" data-sub="1">
        <td class="lbl" style="background:${alt}">
          <div class="inner">
            <span class="grp-dot"></span>
            <span class="lbl-txt">${row.label}</span>
          </div>
        </td>`
      html+=numCells(pArr,fArr,false,false,alt,4,0)
      html+=`</tr>`
    })
    idx++
  })

  // Итоговые строки (без групп)
  const totalRows=ROWS.filter(r=>r.grp===null)
  totalRows.forEach((row,ri)=>{
    const isTotal=row.rowType==='total'
    const isGrand=row.rowType==='grand'
    const isIncome=row.rowType==='income'
    const isFury=row.id==='_fury'
    let bg='#111'
    if(isTotal)bg='#111928'
    if(isGrand)bg='#0d1f0d'
    if(row.rowType==='info')bg='#121212'
    if(isIncome)bg='#141414'

    let pArr,fArr
    if(row.id.startsWith('_')){
      const t=totals[row.id]
      pArr=t?.plan||[0,0,0,0,0]
      fArr=t?.fact||null
    } else {
      pArr=plan[row.id]||[0,0,0,0,0]
      fArr=fact?(fact[row.id]||Array(5).fill(null)):null
    }

    const lblColor=isGrand?'#3db88a':isTotal?'#ccc':isIncome?'#f0a500':'#e0e0e0'
    const bold=isTotal||isGrand
    html+=`<tr class="${isTotal?'total-row':isGrand?'grand-row':isIncome?'income-row':''}">
      <td class="lbl" style="background:${bg}">
        <div class="inner" style="padding-left:14px">
          <span class="lbl-txt" style="color:${lblColor};${bold?'font-weight:700;letter-spacing:.4px;text-transform:uppercase':''}">
            ${row.label}
          </span>
        </div>
      </td>`
    html+=numCells(pArr,fArr,isIncome,isFury,bg,4,0)
    html+=`</tr>`
  })

  return html
}

function render(){
  document.getElementById('thead').innerHTML=buildThead()
  document.getElementById('tbody').innerHTML=buildTbody()
  const wm=WM[curMonth]
  document.getElementById('mbar-title').innerHTML=
    `${curMonth.toUpperCase()} 2026${monthsWithFact.has(curMonth)?'<span class="fact-tag">● ФАКТ ЗАГРУЖЕН</span>':''}`
  document.getElementById('mbar-w').textContent=
    `${wm[0].n} — ${wm[4].n} · ${wm[0].d.split('—')[0].trim()} — ${wm[4].d.split('—')[1]?.trim()}`
}

function renderTabs(){
  document.getElementById('mtabs').innerHTML=MONTHS.map(m=>{
    const hf=monthsWithFact.has(m)
    return`<button class="mtab${m===curMonth?' active':''}" onclick="switchMonth('${m}')">${m}${hf?'<span class="fdot"></span>':''}</button>`
  }).join('')
  document.getElementById('msel').innerHTML=MONTHS.map(m=>
    `<button class="mbtn${m===uploadMonth?' sel':''}" onclick="setUM('${m}')">${m}</button>`
  ).join('')
}

function switchMonth(m){curMonth=m;renderTabs();render()}
function setUM(m){uploadMonth=m;document.querySelectorAll('.mbtn').forEach(b=>b.classList.toggle('sel',b.textContent.trim()===m))}
function toggleUpload(){const p=document.getElementById('upload-panel'),b=document.getElementById('ubtn');const s=!p.classList.contains('show');p.classList.toggle('show',s);b.classList.toggle('active',s)}

async function fetchData(){
  try{
    const r=await fetch(`${API}/api/data`,{mode:'cors'})
    if(!r.ok)throw new Error()
    const d=await r.json()
    for(const[m,v]of Object.entries(d)){
      if(!v||!v.ops)continue
      const fact={}
      for(const id of Object.keys(STD))fact[id]=Array(5).fill(null)
      for(const op of v.ops){
        if(!op.is_debit)continue
        const rid=CAT2ID[op.cat?.toLowerCase()]
        if(rid&&op.week>=0&&op.week<5){if(fact[rid][op.week]==null)fact[rid][op.week]=0;fact[rid][op.week]+=op.amount}
      }
      serverFacts[m]=fact;monthsWithFact.add(m)
    }
    const dot=document.getElementById('sdot'),txt=document.getElementById('stxt')
    dot.className='dot ok';txt.textContent='онлайн'
    try{
      const sr=await fetch(`${API}/api/status`)
      if(sr.ok){const sd=await sr.json();if(sd.month){const dt=new Date(sd.created_at);document.getElementById('last-update').innerHTML=`Обновлено: <span>${sd.month} · ${dt.toLocaleString('ru-RU',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</span>`}}
    }catch(e){}
  }catch(e){
    const dot=document.getElementById('sdot'),txt=document.getElementById('stxt')
    dot.className='dot err';txt.textContent='недоступен'
  }
  renderTabs();render()
}

async function handleFile(e){
  const file=e.target.files[0];if(!file)return
  const btn=document.getElementById('fbtn'),pw=document.getElementById('pw'),pb=document.getElementById('pb')
  btn.disabled=true;pw.classList.add('show');pb.style.width='20%'
  const form=new FormData();form.append('file',file);form.append('month',uploadMonth)
  pb.style.width='50%'
  try{
    const r=await fetch(`${API}/api/upload`,{method:'POST',headers:{Authorization:AUTH},body:form})
    pb.style.width='90%'
    if(r.ok){
      const res=await r.json()
      toast(`✓ ${res.processed} операций · ${uploadMonth}${res.unknown?` · ${res.unknown} не распознано`:'`}`,'ok')
      await fetchData()
      if(res.unknown && res.unknown > 0){
        // запрашиваем список нераспознанных
        try{
          const dr=await fetch(`${API}/api/data?month=${encodeURIComponent(uploadMonth)}`,{mode:'cors'})
          if(dr.ok){const dd=await dr.json();if(dd.unknown&&dd.unknown.length)showUnknown(dd.unknown,uploadMonth)}
        }catch(e){}
      }
    }
    else toast('Ошибка: '+r.status,'err')
  }catch(ex){toast('Нет соединения с сервером','err')}
  pb.style.width='100%';setTimeout(()=>{pw.classList.remove('show');pb.style.width='0';btn.disabled=false},500)
  e.target.value=''
}

function toast(msg,type){
  const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`
  setTimeout(()=>t.classList.remove('show'),4000)
}


const CATS = ['Лес','Перевозка леса','Смола','Плёнка','ГСМ','Расходники','Свет','Вывоз мусора','НДС','НДФЛ','Упаковка','Перевозчик','ЗП','Аренда','Адм.','Прочее']

let unkData = []   // [{contractor, desc, amount, week}, ...]
let unkMonth = ''

function showUnknown(unknowns, month) {
  unkData = unknowns
  unkMonth = month
  document.getElementById('unk-cnt').textContent = unknowns.length
  const tbody = document.getElementById('unk-tbody')
  tbody.innerHTML = unknowns.map((u, i) => `
    <tr>
      <td title="${u.c}">${u.c.slice(0,40)}${u.c.length>40?'…':''}</td>
      <td style="color:#666;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${u.d}">${u.d.slice(0,50)}${u.d.length>50?'…':''}</td>
      <td style="text-align:right;font-family:monospace;color:#f0a500;white-space:nowrap">${new Intl.NumberFormat('ru-RU').format(u.a)} ₽</td>
      <td>
        <select class="cat-select" id="cat-${i}">
          ${CATS.map(c => `<option value="${c}"${c==='Прочее'?' selected':''}>${c}</option>`).join('')}
        </select>
      </td>
    </tr>
  `).join('')
  document.getElementById('unk-panel').classList.add('show')
  // скроллим к панели
  document.getElementById('unk-panel').scrollIntoView({behavior:'smooth', block:'nearest'})
}

async function saveClassifications() {
  const btn = document.getElementById('unk-save')
  btn.disabled = true
  btn.textContent = 'Сохраняю...'

  const corrections = unkData.map((u, i) => ({
    contractor: u.c,
    cat: document.getElementById(`cat-${i}`).value,
    week: u.week || -1,
    amount: u.a,
  })).filter(c => c.cat !== 'Прочее')  // Прочее = не трогаем

  if (!corrections.length) {
    toast('Нет изменений — все оставлены в «Прочее»', 'ok')
    dismissUnk()
    return
  }

  try {
    const r = await fetch(`${API}/api/classify`, {
      method: 'POST',
      headers: { Authorization: AUTH, 'Content-Type': 'application/json' },
      body: JSON.stringify({ month: unkMonth, corrections })
    })
    if (r.ok) {
      const res = await r.json()
      toast(`✓ Классифицировано ${res.corrected} операций`, 'ok')
      dismissUnk()
      await fetchData()
    } else {
      toast('Ошибка сохранения: ' + r.status, 'err')
    }
  } catch(e) {
    toast('Нет соединения с сервером', 'err')
  }
  btn.disabled = false
  btn.textContent = 'Сохранить классификацию'
}

function dismissUnk() {
  document.getElementById('unk-panel').classList.remove('show')
  unkData = []
}

renderTabs();render();fetchData()
</script>
